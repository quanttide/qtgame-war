<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>战役指挥部 · 解放</title>
    <style>
        :root {
            --bg: #0d0d0d;
            --panel-bg: #1a1a1a;
            --border: #2a2a2a;
            --text: #b0b0b0;
            --highlight: #c9a33e;
            --own: #3a6ea5;
            --enemy: #a13d3d;
            --paper: #e8dcc8;
            --ink: #2b2b2b;
            --button-bg: #222;
            --button-hover: #2e2e2e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Courier New', 'Noto Serif SC', 'SimSun', serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
            background-image: radial-gradient(ellipse at 20% 20%, #1a1a1a 0%, #0a0a0a 70%);
        }

        /* 左侧：情报与态势区 */
        .left-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
            overflow-y: auto;
            padding: 24px;
            gap: 24px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-bottom: 1px solid var(--border);
            padding-bottom: 16px;
        }
        .header .title {
            font-size: 24px;
            font-weight: bold;
            color: var(--highlight);
            letter-spacing: 4px;
            text-transform: uppercase;
        }
        .header .datetime {
            font-size: 16px;
            color: #888;
            font-family: monospace;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--highlight);
            margin-bottom: 12px;
            border-left: 4px solid var(--highlight);
            padding-left: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 电报风格情报条目 */
        .intel-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .intel-card {
            background: #1e1e1e;
            border: 1px solid #333;
            padding: 14px;
            font-size: 14px;
            line-height: 1.6;
            position: relative;
            transition: 0.2s;
        }
        .intel-card.confirmed {
            border-left: 4px solid var(--own);
        }
        .intel-card.uncertain {
            border-left: 4px solid #8a7a3b;
        }
        .intel-card.rumor {
            border-left: 4px solid #5a5a5a;
            font-style: italic;
        }
        .intel-card .meta {
            font-size: 11px;
            color: #777;
            margin-top: 6px;
            display: flex;
            justify-content: space-between;
        }
        .badge {
            background: #333;
            padding: 2px 8px;
            border-radius: 2px;
            font-size: 10px;
            letter-spacing: 1px;
        }
        .badge.own {
            color: #6ba0d9;
        }
        .badge.enemy {
            color: #d96b6b;
        }

        /* 右侧：命令与日志区 */
        .right-panel {
            width: 400px;
            display: flex;
            flex-direction: column;
            background: var(--panel-bg);
            border-left: 1px solid var(--border);
            overflow-y: auto;
            padding: 24px;
            gap: 24px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px dotted #2a2a2a;
        }
        .progress-bar {
            width: 120px;
            height: 8px;
            background: #333;
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: var(--highlight);
            width: 0%;
            transition: width 0.3s;
        }
        .initiative-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
            background: #3a6ea5;
        }

        .command-btn {
            background: var(--button-bg);
            color: #ccc;
            border: 1px solid #444;
            padding: 14px;
            text-align: left;
            font-size: 15px;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: inherit;
            width: 100%;
        }
        .command-btn:hover {
            background: #2e2e2e;
            border-color: var(--highlight);
            color: #eee;
        }
        .command-btn .icon {
            font-size: 20px;
            width: 28px;
            text-align: center;
        }

        .log-box {
            background: #111;
            border: 1px solid #2a2a2a;
            padding: 12px;
            height: 200px;
            overflow-y: auto;
            font-size: 12px;
            line-height: 1.7;
            color: #999;
            font-family: monospace;
        }
        .log-entry {
            border-bottom: 1px solid #1f1f1f;
            padding: 4px 0;
        }

        /* 弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .modal {
            background: #1e1e1e;
            border: 1px solid #444;
            padding: 30px;
            max-width: 420px;
            color: #ccc;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.6);
        }
        .modal h3 {
            color: var(--highlight);
            margin-bottom: 16px;
            letter-spacing: 2px;
        }
        .modal button {
            margin-top: 20px;
            background: #333;
            border: 1px solid #555;
            color: #ddd;
            padding: 10px 20px;
            cursor: pointer;
            font-family: inherit;
            letter-spacing: 1px;
        }
        .modal button:hover {
            background: #444;
        }
        .hidden {
            display: none;
        }

        .typewriter {
            overflow: hidden;
            white-space: nowrap;
            animation: typing 2s steps(30, end);
        }
        @keyframes typing {
            from {
                width: 0;
            }
            to {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- 左侧：情报态势 -->
    <div class="left-panel">
        <div class="header">
            <span class="title">⚓ 战役指挥部</span>
            <span class="datetime">📅 第 <span id="turnDisplay">1</span> 天 · 08:42</span>
        </div>

        <div>
            <div class="section-title">📊 当前态势评估</div>
            <div style="background:#1a1a1a; border:1px solid #333; padding:16px; font-size:15px; line-height:1.7;" id="assessmentBlock">
                当面之敌约两个团，依托碾庄圩核心阵地固守。我第3纵队已抵近曹八集，炮4团进入发射阵地，坦克营待命。主动权在我，但敌援军动向不明。
            </div>
        </div>

        <div>
            <div class="section-title">📨 情报简报</div>
            <div class="intel-list" id="intelList">
                <!-- 动态填充 -->
            </div>
        </div>
    </div>

    <!-- 右侧：状态与命令 -->
    <div class="right-panel">
        <div>
            <div class="section-title">⚡ 战役状态</div>
            <div class="stat-row">
                <span>战力储备</span>
                <div style="display:flex; align-items:center; gap:8px;">
                    <span id="strengthValue">87</span>/100
                    <div class="progress-bar"><div class="progress-fill" id="strengthBar" style="width:87%;"></div></div>
                </div>
            </div>
            <div class="stat-row">
                <span>主动权</span>
                <span><span class="initiative-dot"></span> <strong id="initiativeText">我方掌握</strong></span>
            </div>
            <div class="stat-row">
                <span>工事强度</span>
                <span id="fortLevel">4/5</span>
            </div>
            <div class="stat-row">
                <span>已方暴露单位</span>
                <span id="exposedCount">3</span>
            </div>
            <div class="stat-row">
                <span>敌确认单位</span>
                <span id="enemyCount">2</span>
            </div>
        </div>

        <div>
            <div class="section-title">🎖️ 下达命令</div>
            <div style="display:flex; flex-direction:column; gap:10px;">
                <button class="command-btn" onclick="issueCommand('recon')">
                    <span class="icon">🔍</span> 强化侦察：核实敌预备队位置
                </button>
                <button class="command-btn" onclick="issueCommand('bombard')">
                    <span class="icon">💥</span> 炮火准备：对碾庄核心阵地急袭
                </button>
                <button class="command-btn" onclick="issueCommand('flank')">
                    <span class="icon">↗️</span> 右翼迂回：炮4团向潘塘方向机动
                </button>
                <button class="command-btn" onclick="issueCommand('hold')">
                    <span class="icon">🛡️</span> 就地固守：抢修工事，补充弹药
                </button>
                <button class="command-btn" onclick="openCustomOrder()">
                    <span class="icon">✍️</span> 自定义命令（参谋推演）
                </button>
            </div>
        </div>

        <div>
            <div class="section-title">📜 作战日志</div>
            <div class="log-box" id="logBox">
                <div class="log-entry">08:00 · 战役开始，各部队进入出发阵地。</div>
                <div class="log-entry">08:15 · 炮兵群对敌前沿实施压制射击。</div>
            </div>
        </div>
    </div>

    <!-- 参谋推演弹窗 -->
    <div id="customModal" class="modal-overlay hidden">
        <div class="modal">
            <h3>📋 参谋部推演</h3>
            <p id="modalPlan">根据当前态势，建议以坦克营为箭头，步兵两翼跟进，炮兵延伸射击。预计突破成功率61%，伤亡约400人。主要风险：敌装甲反击。</p>
            <div style="display:flex; gap:12px;">
                <button onclick="confirmCustom()">✅ 批准执行</button>
                <button onclick="closeModal()">❌ 暂缓</button>
            </div>
        </div>
    </div>

    <script>
        // ---------- 战役状态 ----------
        const state = {
            turn: 1,
            strength: 87,
            initiative: 'own', // own / enemy
            fortStrength: 4,
            ownUnits: [
                { id: '3rdReg', type: '步兵', position: '曹八集外围', status: '待命' },
                { id: '4thArt', type: '炮兵', position: '发射阵地A', status: '就绪' },
                { id: 'tankBtn', type: '装甲', position: '集结点B', status: '待命' }
            ],
            enemyIntel: [
                { id: 'e107', type: '步兵', estimatedPos: '碾庄核心', confidence: '高' },
                { id: 'e108', type: '步兵', estimatedPos: '碾庄以东2公里', confidence: '中' },
                { id: 'eArmor', type: '装甲', estimatedPos: '未知', confidence: '低' }
            ],
            logs: [
                '08:00 · 战役开始，各部队进入出发阵地。',
                '08:15 · 炮兵群对敌前沿实施压制射击。'
            ],
            intelCards: []
        };

        // 初始化情报卡片
        function buildIntelCards() {
            return [
                {
                    text: '🟢 第3纵队已抵近曹八集，未遇抵抗。当面无敌情。',
                    meta: '来源：前指电台 · 10分钟前',
                    class: 'confirmed'
                },
                {
                    text: '🟡 侦察连报告：碾庄以北观测到敌装甲车辆运动，数量不详。',
                    meta: '来源：侦察连 · 35分钟前 · 可信度:中',
                    class: 'uncertain'
                },
                {
                    text: '🔴 无线电截获：敌可能于明日黄昏前获得空投补给，位置不明。',
                    meta: '来源：技术侦察 · 可信度:低',
                    class: 'rumor'
                }
            ];
        }

        function renderIntel() {
            const container = document.getElementById('intelList');
            container.innerHTML = state.intelCards.map(c => `
                <div class="intel-card ${c.class}">
                    <div>${c.text}</div>
                    <div class="meta">${c.meta}</div>
                </div>
            `).join('');
        }

        function renderLogs() {
            const box = document.getElementById('logBox');
            box.innerHTML = state.logs.slice(-8).map(l => `<div class="log-entry">${l}</div>`).join('');
            box.scrollTop = box.scrollHeight;
        }

        function updateUI() {
            document.getElementById('turnDisplay').textContent = state.turn;
            document.getElementById('strengthValue').textContent = state.strength;
            document.getElementById('strengthBar').style.width = state.strength + '%';
            document.getElementById('initiativeText').textContent = state.initiative === 'own' ? '我方掌握' : '敌方夺回';
            document.getElementById('fortLevel').textContent = state.fortStrength + '/5';
            document.getElementById('exposedCount').textContent = state.ownUnits.length;
            document.getElementById('enemyCount').textContent = state.enemyIntel.filter(e => e.confidence === '高').length;
            // 更新评估文字
            const assess = document.getElementById('assessmentBlock');
            const enemyDesc = state.enemyIntel.map(e => `${e.confidence === '高' ? '确认' : '可能'}${e.type}于${e.estimatedPos}`).join('，');
            assess.textContent = `当面敌情：${enemyDesc || '暂无明确情报'}。我${state.ownUnits.map(u => u.type).join('、')}已进入指定位置。${state.initiative === 'own' ? '主动权在我，建议保持压力。' : '敌正尝试反击，需调整部署。'}`;
        }

        function addLog(msg) {
            const hour = 8 + Math.floor(state.turn * 0.5);
            const min = (state.turn * 30) % 60;
            const time = `${hour.toString().padStart(2,'0')}:${min.toString().padStart(2,'0')}`;
            state.logs.push(`${time} · ${msg}`);
            renderLogs();
        }

        function enemyAction() {
            // 敌人可能移动、隐藏、增援
            const actions = [
                () => {
                    // 移动一个单位位置模糊化
                    const unit = state.enemyIntel.find(e => e.confidence === '高');
                    if (unit) {
                        unit.confidence = '中';
                        unit.estimatedPos = '碾庄附近（具体待核实）';
                        addLog('情报：敌107团失去目视接触，位置转为估计。');
                    }
                },
                () => {
                    // 新增模糊情报
                    if (state.enemyIntel.length < 4) {
                        state.enemyIntel.push({ id: 'e109', type: '步兵', estimatedPos: '运河东岸', confidence: '低' });
                        state.intelCards.push({
                            text: '🔴 难民报告：运河东岸出现不明武装人员，着敌军制服。',
                            meta: '来源：地方游击队 · 可信度:低',
                            class: 'rumor'
                        });
                    }
                },
                () => {
                    // 敌方反击降低主动权
                    if (Math.random() < 0.3 && state.initiative === 'own') {
                        state.initiative = 'enemy';
                        addLog('警告：敌发起局部反冲击，我方主动权暂时丧失！');
                    }
                }
            ];
            const act = actions[Math.floor(Math.random() * actions.length)];
            act();
        }

        function issueCommand(type) {
            let logMsg = '';
            switch (type) {
                case 'recon':
                    logMsg = '命令：侦察分队前出，重点查明敌预备队及装甲单位位置。';
                    // 提高一个敌方单位可信度
                    const target = state.enemyIntel.find(e => e.confidence !== '高');
                    if (target) {
                        target.confidence = '高';
                        target.estimatedPos = '碾庄以北1.5公里树林边缘';
                        state.intelCards.push({
                            text: `🟢 侦察确认：敌${target.type}位于${target.estimatedPos}。`,
                            meta: '来源：侦察连 · 即时',
                            class: 'confirmed'
                        });
                        logMsg += ' 已确认敌一部位置。';
                    } else {
                        logMsg += ' 未发现新目标，该区域干净。';
                    }
                    state.strength = Math.max(0, state.strength - 3);
                    break;
                case 'bombard':
                    logMsg = '命令：炮兵群对碾庄核心阵地实施15分钟火力准备。';
                    state.strength = Math.max(0, state.strength - 15);
                    state.fortStrength = Math.max(0, state.fortStrength - 1);
                    // 可能消灭一敌单位
                    if (Math.random() < 0.5 && state.enemyIntel.length > 1) {
                        const removed = state.enemyIntel.shift();
                        logMsg += ` 观察所报告：敌${removed.type}阵地被覆盖，估计遭重创。`;
                    }
                    break;
                case 'flank':
                    logMsg = '命令：炮4团向潘塘方向机动，准备侧翼支援。';
                    // 移动己方单位
                    const art = state.ownUnits.find(u => u.id === '4thArt');
                    if (art) art.position = '潘塘公路东侧';
                    state.strength = Math.max(0, state.strength - 4);
                    break;
                case 'hold':
                    logMsg = '命令：各部队就地转入防御，抢修工事。';
                    state.fortStrength = Math.min(5, state.fortStrength + 1);
                    state.strength = Math.min(100, state.strength + 8);
                    break;
                default:
                    break;
            }
            addLog(logMsg);
            state.turn++;
            enemyAction();
            // 自然损耗
            state.strength = Math.max(0, state.strength - 2);
            renderIntel();
            updateUI();
        }

        function openCustomOrder() {
            document.getElementById('customModal').classList.remove('hidden');
            // 动态推演文案
            const successRate = Math.floor(50 + Math.random() * 40);
            const casualty = Math.floor(200 + Math.random() * 500);
            document.getElementById('modalPlan').textContent =
                `参谋部综合当前情报提出方案：集中坦克营突破中央，步兵第3团跟进扩大突破口，炮4团压制敌炮兵。预计成功率${successRate}%，预计伤亡${casualty}人。主要风险：敌装甲预备队可能从右翼反击。`;
        }

        function confirmCustom() {
            document.getElementById('customModal').classList.add('hidden');
            addLog('批示：批准参谋部方案，立即执行。');
            state.strength = Math.max(0, state.strength - 20);
            state.turn++;
            // 模拟战果
            if (Math.random() < 0.6) {
                if (state.enemyIntel.length > 0) {
                    const eliminated = state.enemyIntel.shift();
                    addLog(`战报：敌${eliminated.type}被击溃，突破口已打开。`);
                }
            } else {
                addLog('战报：进攻受阻，敌火力猛烈，部队就地转入防御。');
            }
            enemyAction();
            renderIntel();
            updateUI();
        }

        function closeModal() {
            document.getElementById('customModal').classList.add('hidden');
        }

        // 初始化
        state.intelCards = buildIntelCards();
        renderIntel();
        renderLogs();
        updateUI();
    </script>
</body>
</html>
